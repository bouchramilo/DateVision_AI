# monitoring\alert.rules.yml
groups:
- name: DateVision-alerts
  rules:

  # Container CPU Usage Alert
  - alert: ContainerCpuHigh
    expr: sum(rate(container_cpu_usage_seconds_total{name!=""}[5m])) by (name) * 100 > 80
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High Container CPU Usage"
      description: "Container {{ $labels.name }} CPU usage is > 80% (current value: {{ $value }}%)"

  # Container Memory Usage Alert
  - alert: ContainerMemoryHigh
    expr: container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""} * 100 > 80
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High Container Memory Usage"
      description: "Container {{ $labels.name }} memory usage is > 80% (current value: {{ $value }}%)"

  # Container Restart Alert
  - alert: ContainerRestarted
    expr: count(changes(container_last_seen{name!=""}[10m]) > 1) by (name)
    for: 1m
    labels:
      severity: info
    annotations:
      summary: "Container Restarted"
      description: "Container {{ $labels.name }} has restarted recently"
