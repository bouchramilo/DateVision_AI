services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: DateVision_backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/DateVision_DB
      - ENVIRONMENT=development
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://vector_db:6333
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - DateVision_network
    volumes:
      - ../app:/app/app
      - ../data:/app/data

  db:
    image: postgres:15-alpine
    container_name: DateVision_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=DateVision_DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - DateVision_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # AI Services
  vector_db:
    image: qdrant/qdrant:latest
    container_name: DateVision_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - DateVision_network

  ollama:
    image: ollama/ollama:latest
    container_name: DateVision_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - DateVision_network

  # MLOps & Monitoring
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: DateVision_mlflow
    ports:
      - "5000:5000"
    networks:
      - DateVision_network
    # Use environment if needed, standard mlflow entrypoint is usually fine

  prometheus:
    image: prom/prometheus:latest
    container_name: DateVision_prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - DateVision_network

  grafana:
    image: grafana/grafana:latest
    container_name: DateVision_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - DateVision_network
    depends_on:
      - prometheus

networks:
  DateVision_network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  grafana_data: