services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: DateVision_backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/DateVision_DB
      - ENVIRONMENT=development
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://vector_db:6333
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - DateVision_network
    volumes:
      - ../app:/app/app
      - ../data:/app/data
      - ../models:/app/models
      - ../tests:/app/tests

  db:
    image: postgres:15-alpine
    container_name: DateVision_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=DateVision_DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - DateVision_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # AI Services
  vector_db:
    image: qdrant/qdrant:latest
    container_name: DateVision_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - DateVision_network

  ollama:
    image: ollama/ollama:latest
    container_name: DateVision_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - DateVision_network

  # MLOps & Monitoring
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: DateVision_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    networks:
      - DateVision_network

  prometheus:
    image: prom/prometheus:latest
    container_name: DateVision_prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - DateVision_network

  grafana:
    image: grafana/grafana:latest
    container_name: DateVision_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - DateVision_network
    depends_on:
      - prometheus

  # Airflow Services
  airflow-common:
    &airflow-common
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    image: datevision-airflow:latest
    environment:
      &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:password@db:5432/airflow_db
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
    env_file:
      - ../.env
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/tasks:/opt/airflow/dags/tasks
      - ../airflow/functions:/opt/airflow/dags/functions
      - ../airflow/config:/opt/airflow/dags/config
      - ../airflow/classification_config.py:/opt/airflow/classification_config.py
      - ../data:/opt/airflow/data
      - ../models:/opt/airflow/models
      - ../analyse_configuration:/opt/airflow/analyse_configuration
      - ../tests:/opt/airflow/tests
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - DateVision_network

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    container_name: DateVision_airflow_webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    container_name: DateVision_airflow_scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: DateVision_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin

networks:
  DateVision_network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  grafana_data: